name: Merge

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/**'
      - '.github/graphics/**'
      - '!.github/workflows/**'
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag set to deploy; e.g. PR number or prod"
        type: string
        default: 'prod'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  deploy-test:
    name: Deploy (TEST)
    uses: ./.github/workflows/.deploy.yml
    secrets: inherit
    with:
      environment: test
      target: test

  tests:
    name: Tests
    needs: [deploy-test]
    uses: ./.github/workflows/.tests.yml
    with:
      target: test

  deploy-prod:
    name: Deploy (PROD)
    needs: [tests]
    uses: ./.github/workflows/.deploy.yml
    secrets: inherit
    with:
      environment: prod
      target: prod

  promote:
    name: Promote Images
    needs: [deploy-prod]
    runs-on: ubuntu-slim
    permissions:
      packages: write
    strategy:
      matrix:
        package: [migrations, backend, frontend]
    timeout-minutes: 1
    steps:
      - uses: shrink/actions-docker-registry-tag@e6aaef25c595b6e0edd18bf4c7dbfea3abd43299 # v5
        with:
          registry: ghcr.io
          repository: ${{ github.repository }}/${{ matrix.package }}
          target: ${{ needs.deploy-prod.outputs.tag }}
          tags: prod