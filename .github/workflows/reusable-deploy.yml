# Reusable Deploy - Lite Mode Verification
name: Reusable Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub/OpenShift environment
        default: ""
        type: string
      target:
        description: Deployment target; usually PR number, test or prod
        default: ${{ github.event.number }}
        type: string
      tag:
        description: Container tag
        default: ${{ github.event.number }}
        type: string
      triggers:
        description: Triggers for deployment
        default: ""
        type: string

    secrets:
      db_password:
        description: Database password
        required: true
      oc_namespace:
        description: OpenShift namespace
        required: true
      oc_token:
        description: OpenShift token
        required: true

    outputs:
      triggered:
        description: Has deployment been triggered?
        value: ${{ jobs.init.outputs.triggered }}

permissions: {}

jobs:
  init:
    name: Deploy (init)
    environment: ${{ inputs.environment }}
    outputs:
      triggered: ${{ steps.deploy.outputs.triggered }}
    runs-on: ubuntu-24.04
    steps:
      - uses: bcgov/action-deployer-openshift@1ffe5c65252909912e1dfad2dc7f683587d21da9 # v4.2.0
        id: deploy
        with:
          file: common/openshift.init.yml
          oc_namespace: ${{ secrets.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}
          overwrite: true
          parameters: -p DB_PASSWORD="${{ secrets.db_password }}"
            -p ZONE="${{ inputs.target }}"
            -p NAME="${{ github.event.repository.name }}"
          triggers: ${{ inputs.triggers }}
          debug: true

  deploy:
    name: Deploy (${{ matrix.name }})
    environment: ${{ inputs.environment }}
    needs: [init]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        name: [database, backend, frontend]
        include:
          - name: database
            file: common/openshift.database.yml
            parameters: -p DB_PVC_SIZE="256Mi"
          - name: backend
            file: backend/openshift.deploy.yml
            parameters: -p IMAGE_TAG="${{ inputs.tag }}"
          - name: frontend
            file: frontend/openshift.deploy.yml
            parameters: -p IMAGE_TAG="${{ inputs.tag }}"
    outputs:
      triggered: ${{ steps.deploy.outputs.triggered }}
    steps:
      - uses: bcgov/action-deployer-openshift@1ffe5c65252909912e1dfad2dc7f683587d21da9 # v4.2.0
        id: deploy
        with:
          file: ${{ matrix.file }}
          oc_namespace: ${{ secrets.oc_namespace }}
          oc_server: ${{ vars.oc_server }}
          oc_token: ${{ secrets.oc_token }}
          debug: true
          # Lite mode strips HPA + PDB and scales to 1 replica (Recreate) for PR/sandbox deploys
          lite_mode: ${{ github.event_name == 'pull_request' }}
          parameters: -p ZONE="${{ inputs.target }}"
            -p NAME="${{ github.event.repository.name }}"
            ${{ matrix.parameters }}
          triggers: ${{ inputs.triggers }}
